<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsHub | Loading...</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --bg-color: #0f172a;
            --text-color: #f8fafc;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            color: var(--text-color);
        }

        .splash-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #93c5fd 0%, #3b82f6 50%, #1d4ed8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
            animation: fadeInDown 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .logo::after {
            content: '.';
            color: #ef4444;
            -webkit-text-fill-color: #ef4444;
        }

        .loader {
            width: 60px;
            height: 60px;
            position: relative;
            animation: fadeIn 1s ease-in-out 0.5s both;
        }

        .loader::before, .loader::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
        }

        .loader::before {
            border-top-color: var(--primary);
            border-bottom-color: var(--primary);
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .loader::after {
            border-left-color: #ef4444;
            border-right-color: #ef4444;
            animation: spin 1s linear infinite reverse;
        }

        .loading-text {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse 2s infinite, fadeIn 1s ease-in-out 0.8s both;
        }

        /* Abstract background elements */
        .bg-glow {
            position: absolute;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, rgba(15,23,42,0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="splash-container">
        <div class="logo">NewsHub</div>
        <div class="loader"></div>
        <div class="loading-text">Loading System</div>
    </div>

    <script>
        // Redirect to login page after 2.5 seconds
        setTimeout(function() {
            window.location.href = "{% url 'login' %}";
        }, 2500);
    </script>
</body>
</html>
