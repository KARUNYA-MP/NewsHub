{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/login.css' %}?v=4">
{% endblock %}

{% block content %}

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-brand-logo">📰 NewsHub</div>
      <h2>Welcome Back</h2>
      <p class="auth-desc">Sign in to access the latest news and updates</p>
    </div>

    <form method="POST" class="auth-form">
      {% csrf_token %}

      <div class="auth-field">
        <label for="id_username">Username or Email</label>
        <input
          type="text"
          id="id_username"
          name="username"
          placeholder="Enter your username or email"
          autocomplete="username"
          required>
      </div>

      <div class="auth-field">
        <label for="id_password">Password</label>
        <input
          type="password"
          id="id_password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required>
      </div>

      <button type="submit" class="auth-submit-btn">
        Sign In →
      </button>

    </form>

    <div class="auth-footer">
      Don't have an account?
      <a href="{% url 'register' %}">Create one free</a>
    </div>

  </div>
</div>

{% endblock %}
